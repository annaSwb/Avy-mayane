<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avi & Mayane • 2 Août 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --lavender: #c8b8d8;
    --lavender-light: #e8dff0;
    --gold: #b8965a;
    --gold-light: #d4af7a;
    --cream: #faf8f5;
    --white: #ffffff;
    --text: #4a3f5c;
    --text-light: #7a6e8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === FLORAL SVG BACKGROUNDS === */
  .floral-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  /* === MAIN CONTAINER === */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* === DECORATIVE FRAME === */
  .frame {
    position: relative;
    background: rgba(255,255,255,0.88);
    border: 1.5px solid var(--gold-light);
    border-radius: 4px;
    max-width: 480px;
    width: 100%;
    padding: 50px 40px 40px;
    text-align: center;
    box-shadow: 0 8px 60px rgba(184,150,90,0.12), 0 2px 20px rgba(0,0,0,0.06);
    backdrop-filter: blur(4px);
  }

  .frame::before, .frame::after {
    content: '';
    position: absolute;
    border: 1px solid var(--lavender);
    border-radius: 2px;
    pointer-events: none;
  }
  .frame::before { inset: 8px; }
  .frame::after { inset: 14px; opacity: 0.4; }

  /* Corner ornaments */
  .corner {
    position: absolute;
    width: 36px;
    height: 36px;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 4px; left: 4px; }
  .corner-tr { top: 4px; right: 4px; transform: scaleX(-1); }
  .corner-bl { bottom: 4px; left: 4px; transform: scaleY(-1); }
  .corner-br { bottom: 4px; right: 4px; transform: scale(-1,-1); }

  /* === LOGO / MONOGRAM === */
  .monogram-wrap {
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeDown 0.8s ease 0.2s forwards;
  }
  .monogram-wrap img {
    width: 90px;
    height: auto;
    filter: drop-shadow(0 2px 8px rgba(200,184,216,0.5));
  }

  /* === COUPLE PHOTO === */
  .photo-arch {
    position: relative;
    width: 200px;
    margin: 0 auto 28px;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.4s forwards;
  }

  .photo-arch .arch-clip {
    width: 200px;
    height: 240px;
    border-radius: 100px 100px 8px 8px;
    overflow: hidden;
    border: 3px solid var(--gold-light);
    box-shadow: 0 6px 30px rgba(184,150,90,0.2);
  }

  .photo-arch .arch-clip img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* Gold arch overlay line */
  .photo-arch::after {
    content: '';
    position: absolute;
    top: -3px; left: -3px; right: -3px;
    height: 104px;
    border: 3px solid var(--gold);
    border-bottom: none;
    border-radius: 103px 103px 0 0;
    pointer-events: none;
  }

  /* === NAMES === */
  .names {
    font-family: 'Great Vibes', cursive;
    font-size: 3.2rem;
    color: var(--gold);
    line-height: 1.1;
    margin-bottom: 6px;
    letter-spacing: 0.01em;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.6s forwards;
    text-shadow: 0 2px 12px rgba(184,150,90,0.25);
  }

  .ampersand {
    font-size: 2.6rem;
    color: var(--gold-light);
  }

  /* === DATE LINE === */
  .date-line {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    color: var(--text-light);
    text-transform: uppercase;
    margin: 10px 0 24px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.7s forwards;
  }

  /* === DIVIDER === */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.8s forwards;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-light), transparent); }
  .divider-diamond {
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  /* === COUNTDOWN === */
  .countdown-wrap {
    margin: 20px 0 28px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.9s forwards;
  }

  .countdown {
    display: flex;
    justify-content: center;
    gap: 20px;
    background: linear-gradient(135deg, rgba(250,248,245,0.8), rgba(232,223,240,0.3));
    border: 1px solid rgba(184,150,90,0.2);
    border-radius: 40px;
    padding: 16px 28px;
  }

  .cd-unit { text-align: center; }
  .cd-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    display: block;
  }
  .cd-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.52rem;
    letter-spacing: 0.18em;
    color: var(--text-light);
    text-transform: uppercase;
    margin-top: 4px;
    display: block;
  }
  .cd-sep {
    font-size: 1.4rem;
    color: var(--gold-light);
    align-self: flex-start;
    padding-top: 6px;
    font-weight: 300;
  }

  /* === CTA BUTTON === */
  .cta-btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), #9a7840, var(--gold));
    background-size: 200% 100%;
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 16px 42px;
    border-radius: 2px;
    transition: background-position 0.4s ease, transform 0.2s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 20px rgba(184,150,90,0.35);
    opacity: 0;
    animation: fadeUp 0.8s ease 1.0s forwards;
  }
  .cta-btn:hover {
    background-position: 100% 0;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(184,150,90,0.45);
  }

  /* === FLORAL DECORATIONS (pure CSS SVG inline) === */
  .floral-tl, .floral-tr, .floral-bl, .floral-br {
    position: fixed;
    width: 220px;
    height: 280px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.55;
  }
  .floral-tl { top: -20px; left: -20px; }
  .floral-tr { top: -20px; right: -20px; transform: scaleX(-1); }
  .floral-bl { bottom: -20px; left: -20px; transform: scaleY(-1); }
  .floral-br { bottom: -20px; right: -20px; transform: scale(-1,-1); }

  /* === ANIMATIONS === */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* === RESPONSIVE === */
  @media (max-width: 520px) {
    .frame { padding: 40px 28px 32px; }
    .names { font-size: 2.6rem; }
    .floral-tl, .floral-tr, .floral-bl, .floral-br { width: 150px; height: 190px; }
  }
</style>

      <svg viewBox="0 0 36 36"><path d="M2 34 Q2 2 34 2" stroke="#b8965a" stroke-width="0.8" fill="none"/><circle cx="2" cy="34" r="1.5" fill="#b8965a"/><circle cx="34" cy="2" r="1.5" fill="#b8965a"/><circle cx="18" cy="18" r="2.5" fill="none" stroke="#d4af7a" stroke-width="0.8"/></svg>
    </div>

    <!-- Monogram -->
    <div class="monogram-wrap">
      <img src="logo_ma.png" alt="MA">
    </div>

    <!-- Couple Photo -->
    <div class="photo-arch">
      <div class="arch-clip">
        <img src="couple.png" alt="Avi & Mayane">
      </div>
    </div>

    <!-- Names -->
    <div class="names">
      Avi <span class="ampersand">&</span> Mayane
    </div>

    <!-- Date -->
    <div class="date-line">Dimanche 2 Août 2026</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <!-- Countdown -->
    <div class="countdown-wrap">
      <div class="countdown">
        <div class="cd-unit">
          <span class="cd-num" id="cd-days">—</span>
          <span class="cd-label">Jours</span>
        </div>
        <span class="cd-sep">·</span>
        <div class="cd-unit">
          <span class="cd-num" id="cd-hrs">—</span>
          <span class="cd-label">Hrs</span>
        </div>
        <span class="cd-sep">·</span>
        <div class="cd-unit">
          <span class="cd-num" id="cd-min">—</span>
          <span class="cd-label">Min</span>
        </div>
        <span class="cd-sep">·</span>
        <div class="cd-unit">
          <span class="cd-num" id="cd-sec">—</span>
          <span class="cd-label">Sec</span>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <a href="invitation.html" class="cta-btn">Voir l'invitation</a>

  </div>
</div>

<script>
  const weddingDate = new Date('2026-08-02T17:00:00');

  function pad(n){ return String(n).padStart(2,'0'); }

  function tick(){
    const now = new Date();
    const diff = weddingDate - now;
    if(diff <= 0){
      document.getElementById('cd-days').textContent = '00';
      document.getElementById('cd-hrs').textContent = '00';
      document.getElementById('cd-min').textContent = '00';
      document.getElementById('cd-sec').textContent = '00';
      return;
    }
    const days = Math.floor(diff / 86400000);
    const hrs  = Math.floor((diff % 86400000) / 3600000);
    const min  = Math.floor((diff % 3600000)  / 60000);
    const sec  = Math.floor((diff % 60000)    / 1000);
    document.getElementById('cd-days').textContent = days;
    document.getElementById('cd-hrs').textContent  = pad(hrs);
    document.getElementById('cd-min').textContent  = pad(min);
    document.getElementById('cd-sec').textContent  = pad(sec);
  }

  tick();
  setInterval(tick, 1000);
</script>
