<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mariage de Mayane & Avy</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --mauve-main: #8b6fae;
            --mauve-light: #b8a8c8;
            --mauve-gradient: linear-gradient(135deg, #a088c8, #7a5fa8);
            --bg-color: #faf8f3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Conteneur global avec l'animation de sortie */
        #mainPage {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transition: all 1.8s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mainPage.page-exit {
            opacity: 0;
            transform: scale(1.2);
            filter: blur(20px);
        }

        /* Conteneur de la couronne florale parfaitement centré */
        .wreath-wrap {
            position: relative;
            width: min(95vw, 600px); /* Augmenté pour un effet plus large */
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 1.6s ease-out forwards;
        }

        /* Image de la couronne (fleur.png) */
        .wreath-img {
            width: 100%;
            height: auto;
            display: block;
            animation: breathe 6s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        /* Contenu centré dans l'ovale de la couronne */
        .wreath-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Centrage absolu */
            width: 70%;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Arche Photo */
        .photo-arche {
            width: 140px; 
            height: 190px;
            background: #fff;
            padding: 5px;
            border: 1px solid var(--mauve-light);
            border-radius: 70px 70px 0 0;
            margin-bottom: 15px;
            box-shadow: 0 8px 20px rgba(139, 111, 174, 0.15);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-arche img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 65px 65px 0 0;
            transform: scale(1.1);
            animation: zoomPhoto 12s ease-in-out infinite alternate;
        }

        /* Noms en plus gros */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.2rem, 8vw, 3.2rem); 
            color: var(--mauve-main);
            margin-bottom: 8px;
            line-height: 1.1;
        }

        /* Date en plus gros */
        .wedding-date {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem; 
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--mauve-light);
            margin-bottom: 20px;
        }

        /* Timer en plus gros */
        .timer-container {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .timer-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 45px;
        }

        .timer-val {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem; 
            color: var(--mauve-main);
            font-weight: 700;
            line-height: 1;
        }

        .timer-label {
            font-size: 0.45rem; 
            text-transform: uppercase;
            color: var(--mauve-light);
            margin-top: 5px;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        /* Bouton en plus gros */
        .btn-open {
            background: var(--mauve-gradient);
            color: #fff;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem; 
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 50px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 6px 20px rgba(139, 111, 174, 0.4);
            white-space: nowrap;
        }

        .btn-open:active {
            transform: scale(0.95);
        }

        /* Animations */
        @keyframes zoomPhoto {
            0% { transform: scale(1.1); }
            100% { transform: scale(1.3); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.94); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Ajustement mobile pour petits écrans */
        @media (max-width: 400px) {
            .photo-arche { width: 110px; height: 150px; }
            h1 { font-size: 2.1rem; }
            .timer-val { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="mainPage">
        <div class="wreath-wrap">
            <!-- Cadre Floral -->
            <img src="fleur.png" class="wreath-img" alt="Cadre">

            <div class="wreath-content">
                <!-- Photo -->
                <div class="photo-arche">
                    <img src="image.jpeg" alt="Mayane & Avy">
                </div>

                <h1>Mayane & Avy</h1>
                <div class="wedding-date">2 Août 2026</div>

                <!-- Compte à rebours -->
                <div class="timer-container">
                    <div class="timer-box">
                        <span class="timer-val" id="d">00</span>
                        <span class="timer-label">Jours</span>
                    </div>
                    <div class="timer-box">
                        <span class="timer-val" id="h">00</span>
                        <span class="timer-label">Hrs</span>
                    </div>
                    <div class="timer-box">
                        <span class="timer-val" id="m">00</span>
                        <span class="timer-label">Min</span>
                    </div>
                    <div class="timer-box">
                        <span class="timer-val" id="s">00</span>
                        <span class="timer-label">Sec</span>
                    </div>
                </div>

                <a href="invitation.html" class="btn-open" id="btnInvite">Voir l'invitation</a>
            </div>
        </div>
    </div>

    <script>
        const target = new Date(2026, 7, 2, 17, 0, 0).getTime(); 

        function updateTimer() {
            const now = new Date().getTime();
            const diff = target - now;
            
            if (diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('h').innerText = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
                document.getElementById('m').innerText = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
                document.getElementById('s').innerText = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
            }
        }
        
        updateTimer();
        setInterval(updateTimer, 1000);

        document.getElementById('btnInvite').addEventListener('click', function(e) {
            e.preventDefault();
            const href = this.getAttribute('href');
            document.getElementById('mainPage').classList.add('page-exit');
            setTimeout(function() {
                window.location.href = href;
            }, 1800);
        });
    </script>
</body>
</html>
