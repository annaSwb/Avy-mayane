<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mayane & Avy</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            width:100%; height:100%;
            overflow:hidden;
            background:#faf8f3;
            font-family:'Cormorant Garamond', serif;
        }

        .page {
            width:100vw; height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            position:relative;
            overflow:hidden;
        }

        /* Couronne florale : le contenu est positionné par-dessus */
        .wreath-wrap {
            position:relative;
            width: min(98vw, 480px);
            flex-shrink:0;
            animation: fadeIn 1.6s ease-out forwards;
        }
        .wreath-wrap img {
            width:100%;
            display:block;
            animation: breathe 6s ease-in-out infinite;
        }
        @keyframes breathe {
            0%,100% { transform:scale(1); }
            50%      { transform:scale(1.03); }
        }

        /* Contenu centré dans l'ovale de la couronne */
        .wreath-content {
            position:absolute;
            top:50%; left:50%;
            transform:translate(-50%, -62%);
            width:54%;
            text-align:center;
            z-index:5;
        }

        .names {
            font-family:'Great Vibes', cursive;
            font-size: clamp(1.3rem, 6vw, 1.9rem);
            color:#8b6fae;
            line-height:1.1;
            text-shadow:0 2px 20px rgba(139,111,174,.2);
            margin-bottom:6px;
        }

        .wedding-date {
            font-family:'Montserrat', sans-serif;
            font-size:.58rem;
            font-weight:500;
            letter-spacing:.18em;
            text-transform:uppercase;
            color:#b8a8c8;
            margin-bottom:14px;
        }

        /* Compte à rebours */
        .countdown {
            display:flex;
            justify-content:center;
            gap:5px;
            margin-bottom:14px;
        }
        .countdown-block {
            display:flex;
            flex-direction:column;
            align-items:center;
            min-width:36px;
        }
        .countdown-num {
            font-family:'Cinzel', serif;
            font-size:clamp(.7rem, 2.8vw, .88rem);
            font-weight:700;
            color:#8b6fae;
            line-height:1;
        }
        .countdown-label {
            font-family:'Montserrat', sans-serif;
            font-size:.3rem;
            letter-spacing:.12em;
            text-transform:uppercase;
            color:#c9b8e0;
            margin-top:3px;
        }
        .countdown-sep {
            font-size:.9rem;
            color:#c9b8e0;
            line-height:1.4;
            align-self:flex-start;
            padding-top:2px;
        }

        /* Bouton */
        .btn-open {
            display:inline-block;
            font-family:'Montserrat', sans-serif;
            font-size:.58rem;
            font-weight:600;
            letter-spacing:.18em;
            text-transform:uppercase;
            text-decoration:none;
            color:#fff;
            background:linear-gradient(135deg,#a088c8,#7a5fa8);
            padding:11px 24px;
            border-radius:50px;
            box-shadow:0 4px 20px rgba(139,111,174,.35);
            transition:transform .2s;
            white-space:nowrap;
        }
        .btn-open:active { transform:scale(.96); }

        @keyframes fadeIn {
            from { opacity:0; transform:scale(.94); }
            to   { opacity:1; transform:scale(1); }
        }

        /* Charger Cinzel pour les chiffres */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');
    </style>
</head>

<script>
    // Compte à rebours vers le 2 Août 2026 à 17h00
    const target = new Date('2026-08-02T17:00:00');

    function update() {
        const now  = new Date();
        const diff = target - now;
        if (diff <= 0) {
            document.getElementById('cd-j').textContent = '0';
            document.getElementById('cd-h').textContent = '0';
            document.getElementById('cd-m').textContent = '0';
            document.getElementById('cd-s').textContent = '0';
            return;
        }
        const j = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000)  / 60000);
        const s = Math.floor((diff % 60000)    / 1000);
        document.getElementById('cd-j').textContent = j;
        document.getElementById('cd-h').textContent = String(h).padStart(2,'0');
        document.getElementById('cd-m').textContent = String(m).padStart(2,'0');
        document.getElementById('cd-s').textContent = String(s).padStart(2,'0');
    }
    update();
    setInterval(update, 1000);
</script>
